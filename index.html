<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #060e1e; color: #e8e0cc; font-family: 'Courier New', monospace; min-height: 100vh; }
  input, select, textarea, button { font-family: 'Courier New', monospace; }
  input:focus, select:focus, textarea:focus { outline: none; }
  a { text-decoration: none; }
  #header { background: #1B3A6B; border-bottom: 2px solid #C8A84B; padding: 12px 16px; position: sticky; top: 0; z-index: 100; }
  #header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  #brand { color: #C8A84B; font-weight: 700; font-size: 15px; letter-spacing: .1em; }
  #subbrand { color: #ffffff44; font-size: 9px; letter-spacing: .12em; }
  #active-count { color: #C8A84B; font-size: 13px; font-weight: 700; text-align: right; }
  #sync-dot { font-size: 9px; letter-spacing: .08em; }
  #tabs { display: flex; gap: 3px; }
  .tab-btn { flex: 1; padding: 5px 2px; font-size: 9px; font-weight: 700; letter-spacing: .03em; cursor: pointer; border-radius: 4px 4px 0 0; border: 1px solid #ffffff11; border-bottom: none; background: transparent; color: #ffffff33; font-family: 'Courier New', monospace; transition: all .15s; }
  .tab-btn.active { border-color: #C8A84B; background: #060e1e; color: #C8A84B; border-bottom: 1px solid #060e1e; }
  #content { padding: 12px; max-width: 600px; margin: 0 auto; }
  .card { background: #0d1f3c; border: 1px solid #ffffff18; border-radius: 8px; margin-bottom: 8px; }
  .toolbar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
  .btn-gold { background: #C8A84B; color: #1B3A6B; border: none; border-radius: 6px; padding: 6px 14px; font-weight: 700; font-size: 11px; cursor: pointer; letter-spacing: .06em; font-family: 'Courier New', monospace; }
  .btn-ghost { background: transparent; border: 1px solid #ffffff22; color: #fff; border-radius: 6px; padding: 6px 14px; cursor: pointer; font-family: 'Courier New', monospace; font-size: 12px; }
  .btn-sort { padding: 4px 8px; font-size: 9px; border-radius: 4px; border: 1px solid #ffffff22; background: transparent; color: #ffffff44; cursor: pointer; font-family: 'Courier New', monospace; font-weight: 700; }
  .btn-sort.active { border-color: #C8A84B; background: #C8A84B22; color: #C8A84B; }
  .btn-danger { background: #4a1a1a; color: #eb5757; border: 1px solid #eb575733; border-radius: 5px; padding: 4px 10px; font-size: 10px; font-weight: 700; cursor: pointer; font-family: 'Courier New', monospace; }
  .btn-reopen { background: #1a3a4a; color: #C8A84B; border: 1px solid #C8A84B33; border-radius: 5px; padding: 4px 10px; font-size: 10px; font-weight: 700; cursor: pointer; font-family: 'Courier New', monospace; }
  .btn-edit { background: #1a2a4a; color: #88aaff; border: 1px solid #88aaff33; border-radius: 5px; padding: 4px 10px; font-size: 10px; font-weight: 700; cursor: pointer; font-family: 'Courier New', monospace; }
  .chip { padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 700; letter-spacing: .08em; display: inline-block; }
  .toggle-wrap { display: inline-flex; align-items: center; gap: 6px; border-radius: 20px; padding: 3px 10px 3px 6px; cursor: pointer; font-size: 11px; font-weight: 700; font-family: 'Courier New', monospace; letter-spacing: .04em; white-space: nowrap; border: 1px solid; background: none; }
  .toggle-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .pay-badge { border-radius: 4px; padding: 3px 10px; font-size: 10px; font-weight: 700; cursor: pointer; font-family: 'Courier New', monospace; letter-spacing: .06em; border: 1px solid; }
  .inp { background: #0a1628; border: 1px solid #ffffff22; color: #e8e0cc; font-size: 12px; border-radius: 4px; padding: 5px 8px; font-family: 'Courier New', monospace; width: 100%; }
  .inp-ghost { background: transparent; border: none; border-bottom: 1px solid #ffffff18; border-radius: 0; color: #e8e0cc; font-size: 12px; padding: 2px 4px; font-family: 'Courier New', monospace; width: 100%; }
  .lbl { display: block; color: #ffffff44; font-size: 9px; letter-spacing: .1em; margin-bottom: 3px; }
  select.inp { cursor: pointer; }
  textarea.inp { resize: vertical; line-height: 1.5; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .grid4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .modal-overlay { position: fixed; inset: 0; background: #000000bb; display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 16px; }
  .modal { background: #0d1f3c; border: 1px solid #C8A84B; border-radius: 12px; padding: 24px; width: 100%; max-width: 420px; max-height: 90vh; overflow-y: auto; }
  .modal-title { color: #C8A84B; font-weight: 700; font-size: 14px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
  .modal-close { background: none; border: none; color: #fff; font-size: 18px; cursor: pointer; }
  .week-banner { background: #0d1f3c; border: 1px solid #C8A84B44; border-radius: 8px; padding: 10px 14px; margin-bottom: 12px; }
  .stat-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 10px; }
  .hist-row { display: flex; align-items: center; gap: 8px; padding: 5px 14px; border-bottom: 1px solid #ffffff05; }
  .exp-bar-wrap { width: 60px; height: 4px; background: #ffffff11; border-radius: 2px; overflow: hidden; }
  .exp-bar { height: 100%; background: #C8A84B; border-radius: 2px; }
  .empty { text-align: center; color: #ffffff22; padding: 40px; font-size: 12px; }
  .nav-link { display: inline-flex; align-items: center; gap: 6px; background: #1a3a6b; border: 1px solid #C8A84B44; color: #C8A84B; border-radius: 6px; padding: 6px 14px; font-size: 11px; font-weight: 700; margin-bottom: 12px; letter-spacing: .06em; }
  .totals-bar { background: #1B3A6B; border: 1px solid #C8A84B; border-radius: 8px; padding: 12px 16px; margin-top: 8px; display: flex; justify-content: space-between; align-items: center; }
  .plan-badge { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 3px; }
  .info-box { background: #0d1f3c; border: 1px solid #ffffff0a; border-radius: 8px; padding: 10px 14px; margin-bottom: 12px; font-size: 10px; color: #ffffff55; line-height: 1.7; }
  .cw-summary { background: #0a1628; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
  .hist-actions { display: flex; gap: 6px; padding: 8px 14px; border-top: 1px solid #ffffff08; }

<div id="content"></div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwzG8_3TnuB_GxrNN5wvrAt0YxBIAD7WnEn5NuD1KjftZAQDrANgUFLdZWgE4kTtXZnVA/exec";
const LS_KEY = "pt_v3";

let state = {
  codes: makeCodes(),
  expenses: [],
  paymentHistory: [],
  weekEnding: nextSat(),
  sortMode: "trooper",
  showInactive: true,
  expandedCode: null,
  currentTab: "customers",
};

function makeCodes() {
  return Array.from({ length: 60 }, (_, i) => {
    const num = String(i + 1).padStart(3, "0");
    return { code:`TROOPER ${num}`, name:"", address:"", phone:"", email:"", plan:"1x", rate:25, primaryDay:"Fri", secondDay:"", routeStop:"", active:true, notes:"", amountPaid:"", payMethod:"Venmo", payStatus:"Pending", ref1:"", ref2:"", ref3:"", rewardClaimed:false, paySchedule:"weekly", customPlanName:"" };
  });
}

function amountDue(c) {
  if (!c.name) return 0;
  if (c.plan==="custom") return c.paySchedule==="per-visit" ? c.rate : c.rate;
  return c.plan==="2x" ? c.rate*2 : c.rate;
}
function isPerVisit(c) { return c.plan==="custom" && c.paySchedule==="per-visit"; }
function planLabel(c) { return c.plan==="custom" ? (c.customPlanName||"Custom") : c.plan; }
function refCount(c) { return [c.ref1,c.ref2,c.ref3].filter(Boolean).length; }
function rewardLabel(n) { return n===0?"—":n===1?"1 Ref — Free Clean":n===2?"2 Refs — 2 Free + $5 Off":"3 Refs — $5 Off All Season"; }
function mapsUrl(addr) { return `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(addr+", Billings, MT")}`; }
function todayStr() { return new Date().toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric"}); }
function nextSat() { const d=new Date(); const diff=(6-d.getDay()+7)%7||7; d.setDate(d.getDate()+diff); return d.toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric"}); }
function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

const DAY_COLORS = { Fri:{bg:"#1B3A6B",text:"#C8A84B"}, Sat:{bg:"#2E6B3E",text:"#A8D5A2"}, Tue:{bg:"#6B3A1B",text:"#F5C98A"}, Wed:{bg:"#4B1B6B",text:"#D4A8F5"}, Thu:{bg:"#1B5B6B",text:"#A8E0F5"} };
const PAY_COLORS = { Paid:{bg:"#1a4a2a",text:"#6fcf97"}, Pending:{bg:"#4a3a1a",text:"#f2c94c"}, Late:{bg:"#4a1a1a",text:"#eb5757"} };
const PAY_CYCLE = ["Pending","Paid","Late"];
const EXPENSE_CATS = ["Fuel","Supplies","Advertising","Subscriptions","Uniforms / Gear","Equipment","Phone","Other"];

function dayChip(day) {
  if (!day) return "";
  const c = DAY_COLORS[day]||{bg:"#333",text:"#fff"};
  return `<span class="chip" style="background:${c.bg};color:${c.text}">${esc(day).toUpperCase()}</span>`;
}
function planBadge(c) {
  const is2x = c.plan==="2x";
  const isCustom = c.plan==="custom";
  const bg = isCustom ? "#3a1a6b" : is2x ? "#1B3A6B" : "#0a1628";
  const color = isCustom ? "#d4a8f5" : is2x ? "#C8A84B" : "#ffffff33";
  const border = isCustom ? "#d4a8f544" : is2x ? "#C8A84B44" : "#ffffff11";
  const label = isCustom ? (c.customPlanName||"Custom") : c.plan;
  return `<span class="plan-badge" style="background:${bg};color:${color};border:1px solid ${border}">${label}</span>`;
}
function payBadgeHtml(status, gi) {
  const c = PAY_COLORS[status]||PAY_COLORS.Pending;
  return `<button class="pay-badge" style="background:${c.bg};color:${c.text};border-color:${c.text}44" onclick="cyclePayStatus(${gi})">${esc(status).toUpperCase()}</button>`;
}
function toggleBtn(value, onLabel, offLabel, onColor, onclick) {
  const color=value?onColor:"#ffffff44", bg=value?onColor+"22":"#ffffff0a", border=value?onColor:"#ffffff22";
  return `<button class="toggle-wrap" style="color:${color};background:${bg};border-color:${border}" onclick="${onclick}"><span class="toggle-dot" style="background:${value?onColor:"#ffffff22"}"></span>${value?esc(onLabel):esc(offLabel)}</button>`;
}

// ─── STORAGE ────────────────────────────────────────────────────────────────
function saveLocal() { try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch(e) {} }
function loadLocal() {
  try {
    const d = localStorage.getItem(LS_KEY);
    if (!d) return;
    const p = JSON.parse(d);
    if (p.codes) state.codes = p.codes;
    if (p.expenses) state.expenses = p.expenses;
    if (p.paymentHistory) state.paymentHistory = p.paymentHistory;
    if (p.weekEnding) state.weekEnding = p.weekEnding;
  } catch(e) {}
}

// ─── SYNC ───────────────────────────────────────────────────────────────────
let syncTimer = null;
function setSyncStatus(s) {
  const dot = document.getElementById("sync-dot");
  if (!dot) return;
  const map = { idle:["#ffffff33","● SHEETS READY"], syncing:["#C8A84B","● SYNCING..."], ok:["#6fcf97","● SYNCED ✓"], err:["#eb5757","● SYNC ERR"] };
  const [color, label] = map[s]||map.idle;
  dot.style.color = color; dot.textContent = label;
}
async function sheetSync(action, payload) {
  try { await fetch(SCRIPT_URL, { method:"POST", mode:"no-cors", body:JSON.stringify({action,...payload}) }); } catch(e) {}
}
function debouncedRosterSync() {
  clearTimeout(syncTimer);
  setSyncStatus("syncing");
  syncTimer = setTimeout(async () => {
    await sheetSync("syncRoster", { customers: state.codes.filter(c=>c.name) });
    setSyncStatus("ok");
    setTimeout(()=>setSyncStatus("idle"), 3000);
  }, 1500);
}
async function syncExpensesToSheet() {
  setSyncStatus("syncing");
  await sheetSync("syncAllExpenses", { expenses: state.expenses });
  setSyncStatus("ok");
  setTimeout(()=>setSyncStatus("idle"), 3000);
}
async function syncHistoryToSheet() {
  setSyncStatus("syncing");
  await sheetSync("syncAllHistory", { history: state.paymentHistory });
  setSyncStatus("ok");
  setTimeout(()=>setSyncStatus("idle"), 3000);
}

// ─── TABS ───────────────────────────────────────────────────────────────────
function switchTab(tab) {
  state.currentTab = tab;
  document.querySelectorAll(".tab-btn").forEach((b,i) => {
    b.classList.toggle("active", ["customers","payments","referrals","history","expenses"][i]===tab);
  });
  render();
}

// ─── RENDER ─────────────────────────────────────────────────────────────────
function render() {
  updateHeader();
  const c = document.getElementById("content");
  switch(state.currentTab) {
    case "customers": c.innerHTML = renderCustomers(); break;
    case "payments":  c.innerHTML = renderPayments(); break;
    case "referrals": c.innerHTML = renderReferrals(); break;
    case "history":   c.innerHTML = renderHistory(); break;
    case "expenses":  c.innerHTML = renderExpenses(); break;
  }
}
function updateHeader() {
  const el = document.getElementById("active-count");
  if (el) el.textContent = `${state.codes.filter(c=>c.name&&c.active).length} ACTIVE`;
}

// ─── CUSTOMERS ──────────────────────────────────────────────────────────────
function renderCustomers() {
  const allNamed = getSorted();
  const visible = state.showInactive ? allNamed : allNamed.filter(c=>c.active);
  let html = `<div class="toolbar">
    <button class="btn-gold" onclick="openAddCustomer()">+ ENLIST</button>
    ${toggleBtn(state.showInactive,"ALL","ACTIVE ONLY","#C8A84B","toggleShowInactive()")}
    <div style="margin-left:auto;display:flex;gap:4px">
      <button class="btn-sort ${state.sortMode==='trooper'?'active':''}" onclick="setSortMode('trooper')">#</button>
      <button class="btn-sort ${state.sortMode==='route'?'active':''}" onclick="setSortMode('route')">ROUTE</button>
      <button class="btn-sort ${state.sortMode==='day'?'active':''}" onclick="setSortMode('day')">DAY</button>
    </div>
  </div>`;
  if (!visible.length) return html+`<div class="empty">No troopers enlisted.<br><span style="color:#C8A84B;cursor:pointer" onclick="openAddCustomer()">+ Add first customer</span></div>`;
  visible.forEach(c => {
    const gi = state.codes.indexOf(c);
    const isExp = state.expandedCode===c.code;
    html += `<div class="card" style="border-left:3px solid ${c.active?"#C8A84B":"#ffffff18"};opacity:${c.active?1:0.5}">
      <div class="row" style="padding:9px 12px;cursor:pointer" onclick="toggleExpand('${esc(c.code)}')">
        <span style="color:#ffffff22;font-size:9px;min-width:74px;font-weight:700">${esc(c.code)}</span>
        <span style="flex:1;font-weight:700;font-size:13px">${esc(c.name)}</span>
        ${dayChip(c.primaryDay)}${c.secondDay?dayChip(c.secondDay):""}
        ${planBadge(c)}
        <span style="color:#ffffff22;font-size:11px">${isExp?"▲":"▼"}</span>
      </div>`;
    if (!isExp&&c.routeStop) html+=`<div style="padding-left:92px;padding-bottom:6px;font-size:9px;color:#ffffff33">STOP #${esc(c.routeStop)} · $${c.rate}/visit</div>`;
    if (isExp) {
      html+=`<div style="border-top:1px solid #ffffff0a;padding:12px">`;
      if (c.address) html+=`<a class="nav-link" href="${mapsUrl(c.address)}" target="_blank">📍 NAVIGATE TO ${esc(c.name).toUpperCase()}</a>`;
      html+=`<div class="grid2">
        <div><label class="lbl">NAME</label><input class="inp-ghost" value="${esc(c.name)}" onchange="updateField(${gi},'name',this.value)"></div>
        <div><label class="lbl">ADDRESS</label><input class="inp-ghost" value="${esc(c.address)}" onchange="updateField(${gi},'address',this.value)"></div>
        <div><label class="lbl">PHONE</label><input class="inp-ghost" value="${esc(c.phone)}" onchange="updateField(${gi},'phone',this.value)"></div>
        <div><label class="lbl">EMAIL</label><input class="inp-ghost" value="${esc(c.email)}" onchange="updateField(${gi},'email',this.value)"></div>
      </div>
      <div class="grid4">
        <div><label class="lbl">PLAN</label>
          <select class="inp" onchange="updatePlan(${gi},this.value)">
            <option ${c.plan==='1x'?'selected':''} value="1x">1x/$25</option>
            <option ${c.plan==='2x'?'selected':''} value="2x">2x/$20</option>
            <option ${c.plan==='custom'?'selected':''} value="custom">Custom</option>
          </select></div>
        <div><label class="lbl">RATE</label><input class="inp" value="$${c.rate}" onchange="updateField(${gi},'rate',parseInt(this.value.replace('$',''))||${c.rate})"></div>
        <div><label class="lbl">PRIMARY</label>
          <select class="inp" onchange="updateField(${gi},'primaryDay',this.value)">
            <option ${c.primaryDay==='Fri'?'selected':''}>Fri</option>
            <option ${c.primaryDay==='Sat'?'selected':''}>Sat</option>
          </select></div>
        <div><label class="lbl">2ND DAY</label>
          <select class="inp" onchange="updateField(${gi},'secondDay',this.value)">
            <option value="" ${!c.secondDay?'selected':''}>—</option>
            <option ${c.secondDay==='Tue'?'selected':''}>Tue</option>
            <option ${c.secondDay==='Wed'?'selected':''}>Wed</option>
            <option ${c.secondDay==='Thu'?'selected':''}>Thu</option>
          </select></div>
      </div>
      ${c.plan==='custom'?`<div class="grid2" style="margin-bottom:10px">
        <div><label class="lbl">PLAN NAME</label><input class="inp" value="${esc(c.customPlanName)}" placeholder="e.g. 2x Month" onchange="updateField(${gi},'customPlanName',this.value)"></div>
        <div><label class="lbl">PAY SCHEDULE</label>
          <select class="inp" onchange="updateField(${gi},'paySchedule',this.value)">
            <option ${c.paySchedule==='per-visit'?'selected':''} value="per-visit">Per Visit</option>
            <option ${c.paySchedule==='weekly'?'selected':''} value="weekly">Weekly</option>
            <option ${c.paySchedule==='biweekly'?'selected':''} value="biweekly">Bi-Weekly</option>
            <option ${c.paySchedule==='monthly'?'selected':''} value="monthly">Monthly</option>
          </select></div>
      </div>`:""}

      <div class="grid2">
        <div><label class="lbl">ROUTE STOP #</label><input class="inp" value="${esc(c.routeStop)}" onchange="updateField(${gi},'routeStop',this.value)"></div>
        <div style="padding-top:14px">${toggleBtn(c.active,"ACTIVE","PAUSED","#6fcf97",`toggleActive(${gi})`)}</div>
      </div>
      <div style="margin-bottom:8px"><label class="lbl">NOTES</label><textarea class="inp" rows="2" onchange="updateField(${gi},'notes',this.value)">${esc(c.notes)}</textarea></div>`;
      const refs = refCount(c);
      if (refs>0) html+=`<div style="background:#1a3a1a;border:1px solid #2E6B3E44;border-radius:6px;padding:6px 10px;font-size:10px;color:#6fcf97">🎖 ${rewardLabel(refs)}${c.rewardClaimed?" ✓ CLAIMED":""}</div>`;
      html+=`</div>`;
    }
    html+=`</div>`;
  });
  return html;
}

// ─── PAYMENTS ───────────────────────────────────────────────────────────────
function renderPayments() {
  const active = state.codes.filter(c=>c.name&&c.active);
  const weeklyActive = active.filter(c=>!isPerVisit(c));
  const perVisitActive = active.filter(c=>isPerVisit(c));
  const collected = active.filter(c=>c.payStatus==="Paid").reduce((s,c)=>s+(parseFloat(c.amountPaid)||0),0);
  const due = weeklyActive.reduce((s,c)=>s+amountDue(c),0);
  let html = `<div class="week-banner">
    <div class="row" style="justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div><label class="lbl" style="margin-bottom:2px">WEEK ENDING</label>
        <input class="inp" style="width:130px" value="${esc(state.weekEnding)}" onchange="state.weekEnding=this.value;saveLocal()"></div>
      <div style="text-align:right">
        <div style="color:#ffffff44;font-size:9px;letter-spacing:.1em">COLLECTED / DUE</div>
        <div style="color:#C8A84B;font-weight:700;font-size:18px">$${collected.toFixed(0)} <span style="color:#ffffff22;font-size:12px">/ $${due}</span></div>
      </div>
    </div>
    <div class="stat-row">
      <span style="font-size:10px;color:#6fcf97">✓ ${active.filter(c=>c.payStatus==="Paid").length} paid</span>
      <span style="font-size:10px;color:#f2c94c">⏳ ${active.filter(c=>c.payStatus==="Pending").length} pending</span>
      <span style="font-size:10px;color:#eb5757">✗ ${active.filter(c=>c.payStatus==="Late").length} late</span>
      <button class="btn-gold" style="margin-left:auto;padding:5px 14px;font-size:10px" onclick="openCloseWeek()">CLOSE WEEK →</button>
    </div>
  </div>`;
  weeklyActive.forEach(c => {
    const gi = state.codes.indexOf(c);
    const d = amountDue(c);
    const p = parseFloat(c.amountPaid)||0;
    const diff = p-d;
    const lc = PAY_COLORS[c.payStatus]||PAY_COLORS.Pending;
    html+=`<div class="card" style="border-left:3px solid ${lc.text};padding:10px 12px">
      <div class="row" style="margin-bottom:8px">
        <span style="color:#ffffff22;font-size:9px;min-width:74px">${esc(c.code)}</span>
        <span style="flex:1;font-weight:700;font-size:13px">${esc(c.name)}</span>
        ${dayChip(c.primaryDay)}
        <span style="font-size:10px;color:#ffffff44">${planLabel(c)} · $${d} due</span>
      </div>
      <div class="row">
        <div><label class="lbl">AMOUNT PAID</label>
          <div style="display:flex;align-items:center;gap:4px">
            <span style="color:#ffffff44">$</span>
            <input type="number" class="inp" style="width:70px" value="${esc(c.amountPaid)}" placeholder="0" onchange="updateField(${gi},'amountPaid',this.value)">
          </div></div>
        <div><label class="lbl">METHOD</label>
          <select class="inp" onchange="updateField(${gi},'payMethod',this.value)">
            ${["Venmo","Cash","Square","Zelle","Check"].map(m=>`<option ${c.payMethod===m?'selected':''}>${m}</option>`).join("")}
          </select></div>
        <div><label class="lbl">STATUS</label>${payBadgeHtml(c.payStatus,gi)}</div>
        ${c.amountPaid!==""&&diff!==0?`<div style="margin-left:auto;font-size:10px;color:${diff>0?'#6fcf97':'#eb5757'}">${diff>0?'+$'+diff+' over':'-$'+Math.abs(diff)+' short'}</div>`:""}
      </div>
    </div>`;
  });

  // PER-VISIT CUSTOMERS
  if (perVisitActive.length > 0) {
    html+=`<div style="color:#d4a8f5;font-size:9px;letter-spacing:.1em;margin:14px 0 6px;font-weight:700">📅 PER-VISIT CUSTOMERS</div>`;
    perVisitActive.forEach(c => {
      const gi = state.codes.indexOf(c);
      const visits = c.visitLog || [];
      const totalLogged = visits.reduce((s,v)=>s+(parseFloat(v.amount)||0),0);
      html+=`<div class="card" style="border-left:3px solid #d4a8f5;padding:10px 12px;margin-bottom:6px">
        <div class="row" style="margin-bottom:8px">
          <span style="color:#ffffff22;font-size:9px;min-width:74px">${esc(c.code)}</span>
          <span style="flex:1;font-weight:700;font-size:13px">${esc(c.name)}</span>
          ${dayChip(c.primaryDay)}
          <span style="font-size:10px;color:#d4a8f5">${c.customPlanName||"Custom"} · $${c.rate}/visit</span>
        </div>
        <div style="font-size:10px;color:#ffffff55;margin-bottom:8px">${visits.length} visit${visits.length!==1?"s":""} logged this period · <span style="color:#6fcf97;font-weight:700">$${totalLogged.toFixed(2)} collected</span></div>
        ${visits.map((v,vi)=>`<div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid #ffffff08;font-size:11px">
          <span style="color:#ffffff44;font-size:9px">${esc(v.date)}</span>
          <span style="flex:1">${esc(v.method)}</span>
          <span style="color:#6fcf97;font-weight:700">$${parseFloat(v.amount).toFixed(2)}</span>
          <button onclick="deleteVisit(${gi},${vi})" style="background:none;border:none;color:#eb575766;cursor:pointer;font-size:12px;padding:0">✕</button>
        </div>`).join("")}
        <button class="btn-gold" style="margin-top:8px;width:100%;padding:7px;font-size:11px" onclick="logVisit(${gi})">+ LOG VISIT — $${c.rate}</button>
      </div>`;
    });
  }
  if (!active.length) html+=`<div class="empty">No active customers yet.</div>`;
  if (weeklyActive.length) html+=`<div class="totals-bar"><span style="font-weight:700;letter-spacing:.08em;font-size:12px">WEEKLY TOTAL COLLECTED</span><span style="color:#C8A84B;font-weight:700;font-size:16px">$${collected.toFixed(2)}</span></div>`;
  return html;
}

// ─── REFERRALS ──────────────────────────────────────────────────────────────
function renderReferrals() {
  const allNamed = state.codes.filter(c=>c.name);
  let html = `<div class="info-box"><span style="color:#C8A84B;font-weight:700">TIERS: </span>1 ref = free clean · 2 refs = 2 free + $5 off · 3 refs = $5 off all season<br>New customers using a code get <span style="color:#C8A84B">$5 off first visit</span></div>`;
  if (!allNamed.length) return html+`<div class="empty">No customers enlisted yet.</div>`;
  allNamed.forEach(c => {
    const gi = state.codes.indexOf(c);
    const refs = refCount(c);
    const leftColor = refs>=3?"#C8A84B":refs>=1?"#6fcf97":"#ffffff18";
    html+=`<div class="card" style="border-left:3px solid ${leftColor};padding:10px 12px;margin-bottom:8px">
      <div class="row" style="margin-bottom:8px">
        <span style="color:#ffffff22;font-size:9px;min-width:74px">${esc(c.code)}</span>
        <span style="flex:1;font-weight:700;font-size:13px">${esc(c.name)}</span>
        ${refs>0?`<span style="font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px;background:${refs>=3?'#C8A84B22':'#1a4a2a'};color:${refs>=3?'#C8A84B':'#6fcf97'};border:1px solid ${refs>=3?'#C8A84B44':'#2E6B3E44'}">${refs} REF${refs!==1?"S":""}</span>`:""}
      </div>
      <div class="grid3">
        <div><label class="lbl">REFERRAL 1</label><input class="inp" style="font-size:11px;padding:3px 6px" value="${esc(c.ref1)}" placeholder="Name / code" onchange="updateField(${gi},'ref1',this.value)"></div>
        <div><label class="lbl">REFERRAL 2</label><input class="inp" style="font-size:11px;padding:3px 6px" value="${esc(c.ref2)}" placeholder="Name / code" onchange="updateField(${gi},'ref2',this.value)"></div>
        <div><label class="lbl">REFERRAL 3</label><input class="inp" style="font-size:11px;padding:3px 6px" value="${esc(c.ref3)}" placeholder="Name / code" onchange="updateField(${gi},'ref3',this.value)"></div>
      </div>
      ${refs>0?`<div class="row"><span style="font-size:10px;color:${refs>=3?'#C8A84B':'#6fcf97'}">🎖 ${rewardLabel(refs)}</span>${toggleBtn(c.rewardClaimed,"✓ CLAIMED","UNCLAIMED","#6fcf97",`toggleClaimed(${gi})`)}</div>`:""}
    </div>`;
  });
  return html;
}

// ─── HISTORY ────────────────────────────────────────────────────────────────
function renderHistory() {
  let html = `<div style="color:#ffffff44;font-size:10px;margin-bottom:12px;letter-spacing:.06em">PAYMENT HISTORY — ${state.paymentHistory.length} WEEK${state.paymentHistory.length!==1?"S":""} LOGGED</div>`;
  if (!state.paymentHistory.length) return html+`<div class="empty">No history yet.<br>Close your first week in the Payments tab.</div>`;
  [...state.paymentHistory].reverse().forEach((week, ri) => {
    const actualIdx = state.paymentHistory.length - 1 - ri;
    const weekTotal = week.payments.filter(p=>p.payStatus==="Paid").reduce((s,p)=>s+(parseFloat(p.amountPaid)||0),0);
    const late = week.payments.filter(p=>p.payStatus==="Late");
    html+=`<div class="card gold-left" style="margin-bottom:8px;overflow:hidden">
      <div style="padding:10px 14px;display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-weight:700;font-size:13px;color:#C8A84B">WEEK OF ${esc(week.weekEnding)}</div>
          <div style="font-size:10px;color:#ffffff44;margin-top:2px">${week.payments.length} customers · ${late.length>0?`<span style="color:#eb5757">${late.length} late</span>`:`<span style="color:#6fcf97">all accounted for</span>`}</div>
        </div>
        <div style="color:#6fcf97;font-weight:700;font-size:16px">$${weekTotal.toFixed(2)}</div>
      </div>
      <div style="border-top:1px solid #ffffff08">
        ${week.payments.map(p=>{
          const pc=PAY_COLORS[p.payStatus]||PAY_COLORS.Pending;
          return `<div class="hist-row">
            <span style="color:#ffffff22;font-size:9px;min-width:74px">${esc(p.code)}</span>
            <span style="flex:1;font-size:11px">${esc(p.name)}</span>
            <span style="font-size:10px;color:${pc.text}">${esc(p.payStatus)}</span>
            <span style="font-size:11px;color:#ffffff66;min-width:50px;text-align:right">$${parseFloat(p.amountPaid||0).toFixed(2)}</span>
          </div>`;
        }).join("")}
      </div>
      <div class="hist-actions">
        <button class="btn-reopen" onclick="reopenWeek(${actualIdx})">↩ REOPEN WEEK</button>
        <button class="btn-danger" onclick="deleteWeek(${actualIdx})">✕ DELETE</button>
      </div>
    </div>`;
  });
  return html;
}

// ─── EXPENSES ───────────────────────────────────────────────────────────────
function renderExpenses() {
  const total = state.expenses.reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
  const byCat = state.expenses.reduce((acc,e)=>{ acc[e.category]=(acc[e.category]||0)+parseFloat(e.amount); return acc; },{});
  let html = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <div>
      <div style="color:#ffffff44;font-size:9px;letter-spacing:.1em">TOTAL EXPENSES 2026</div>
      <div style="color:#eb5757;font-weight:700;font-size:20px">$${total.toFixed(2)}</div>
    </div>
    <button class="btn-gold" onclick="openAddExpense()">+ LOG EXPENSE</button>
  </div>`;
  if (Object.keys(byCat).length) {
    html+=`<div class="card" style="padding:12px;margin-bottom:12px"><label class="lbl" style="margin-bottom:8px">BY CATEGORY</label>`;
    Object.entries(byCat).sort((a,b)=>b[1]-a[1]).forEach(([cat,amt])=>{
      const pct=Math.min(100,(amt/total)*100);
      html+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-size:11px">${esc(cat)}</span>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="exp-bar-wrap"><div class="exp-bar" style="width:${pct}%"></div></div>
          <span style="font-size:11px;color:#C8A84B;font-weight:700;min-width:55px;text-align:right">$${amt.toFixed(2)}</span>
        </div>
      </div>`;
    });
    html+=`</div>`;
  }
  if (!state.expenses.length) return html+`<div class="empty">No expenses logged yet.</div>`;
  [...state.expenses].reverse().forEach((e,ri)=>{
    const actualIdx = state.expenses.length-1-ri;
    html+=`<div class="card red-left" style="padding:9px 12px;margin-bottom:6px">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="flex:1">
          <div style="font-size:12px;font-weight:700">${esc(e.description)}</div>
          <div style="font-size:9px;color:#ffffff44;margin-top:2px">${esc(e.date)} · ${esc(e.category)}</div>
        </div>
        <div style="color:#eb5757;font-weight:700;font-size:14px">-$${parseFloat(e.amount).toFixed(2)}</div>
      </div>
      <div style="display:flex;gap:6px;margin-top:8px">
        <button class="btn-edit" onclick="openEditExpense(${actualIdx})">✎ EDIT</button>
        <button class="btn-danger" onclick="deleteExpense(${actualIdx})">✕ DELETE</button>
      </div>
    </div>`;
  });
  return html;
}

// ─── MODALS ─────────────────────────────────────────────────────────────────
function showModal(html) {
  let o = document.getElementById("modal-overlay");
  if (!o) { o=document.createElement("div"); o.id="modal-overlay"; o.className="modal-overlay"; document.body.appendChild(o); }
  o.innerHTML=`<div class="modal">${html}</div>`;
  o.style.display="flex";
}
function closeModal() { const o=document.getElementById("modal-overlay"); if(o) o.style.display="none"; }

function openAddCustomer() {
  const empties = state.codes.map((c,i)=>({c,i})).filter(({c})=>!c.name);
  showModal(`
    <div class="modal-title">+ ENLIST NEW TROOPER <button class="modal-close" onclick="closeModal()">✕</button></div>
    <label class="lbl">ASSIGN CODE</label>
    <select class="inp" id="m-idx" style="color:#C8A84B;font-weight:700;margin-bottom:10px">${empties.map(({c,i})=>`<option value="${i}">${esc(c.code)}</option>`).join("")}</select>
    ${["NAME","ADDRESS","PHONE","EMAIL","ROUTE STOP #","NOTES"].map((label,i)=>{
      const keys=["name","address","phone","email","routeStop","notes"];
      const types=["text","text","tel","email","text","text"];
      return `<label class="lbl">${label}</label><input type="${types[i]}" class="inp" id="m-${keys[i]}" style="margin-bottom:10px">`;
    }).join("")}
      <div class="grid3" style="margin-bottom:16px">
      <div><label class="lbl">PLAN</label>
        <select class="inp" id="m-plan" onchange="
          var v=this.value;
          document.getElementById('m-rate').value=v==='2x'?20:25;
          document.getElementById('m-custom-fields').style.display=v==='custom'?'block':'none';
        ">
          <option value="1x">1x / $25</option>
          <option value="2x">2x / $20</option>
          <option value="custom">Custom</option>
        </select></div>
      <div><label class="lbl">PRIMARY DAY</label>
        <select class="inp" id="m-primaryDay"><option>Fri</option><option>Sat</option></select></div>
      <div><label class="lbl">2ND DAY</label>
        <select class="inp" id="m-secondDay"><option value="">—</option><option>Tue</option><option>Wed</option><option>Thu</option></select></div>
    </div>
    <div id="m-custom-fields" style="display:none;margin-bottom:12px">
      <div class="grid2">
        <div><label class="lbl">PLAN NAME</label><input class="inp" id="m-customPlanName" placeholder="e.g. 2x Month"></div>
        <div><label class="lbl">PAY SCHEDULE</label>
          <select class="inp" id="m-paySchedule">
            <option value="per-visit">Per Visit</option>
            <option value="weekly">Weekly</option>
            <option value="biweekly">Bi-Weekly</option>
            <option value="monthly">Monthly</option>
          </select></div>
      </div>
    </div>
    <input type="hidden" id="m-rate" value="25">
    <div style="display:flex;gap:10px">
      <button class="btn-ghost" onclick="closeModal()">CANCEL</button>
      <button class="btn-gold" style="flex:2;padding:10px" onclick="saveNewCustomer()">ENLIST TROOPER</button>
    </div>`);
}
function saveNewCustomer() {
  const idx = parseInt(document.getElementById("m-idx").value);
  const fields = ["name","address","phone","email","routeStop","notes","plan","primaryDay","secondDay","rate","customPlanName","paySchedule"];
  const vals = {};
  fields.forEach(f=>{ const el=document.getElementById("m-"+f); vals[f]=el?el.value:""; });
  vals.rate = parseInt(vals.rate)||25;
  state.codes[idx] = {...state.codes[idx],...vals};
  saveLocal(); debouncedRosterSync(); closeModal(); render();
}

function openAddExpense() { showExpenseModal(); }
function openEditExpense(idx) { showExpenseModal(idx); }
function showExpenseModal(editIdx=null) {
  const e = editIdx!==null ? state.expenses[editIdx] : null;
  showModal(`
    <div class="modal-title">${e?"✎ EDIT EXPENSE":"+ LOG EXPENSE"} <button class="modal-close" onclick="closeModal()">✕</button></div>
    <label class="lbl">DATE</label><input class="inp" id="e-date" value="${e?esc(e.date):todayStr()}" style="margin-bottom:10px">
    <label class="lbl">DESCRIPTION</label><input class="inp" id="e-desc" value="${e?esc(e.description):""}" placeholder="e.g. Gas fill-up, bags..." style="margin-bottom:10px">
    <label class="lbl">CATEGORY</label>
    <select class="inp" id="e-cat" style="margin-bottom:10px" onchange="document.getElementById('e-custom-wrap').style.display=this.value==='Other'?'block':'none'">
      ${EXPENSE_CATS.map(c=>`<option ${e&&e.category===c?'selected':''}>${c}</option>`).join("")}
    </select>
    <div id="e-custom-wrap" style="display:none;margin-bottom:10px">
      <label class="lbl">CUSTOM CATEGORY</label><input class="inp" id="e-custom" value="${e&&!EXPENSE_CATS.includes(e.category)?esc(e.category):""}" placeholder="Enter category...">
    </div>
    <label class="lbl">AMOUNT ($)</label><input type="number" class="inp" id="e-amount" value="${e?e.amount:""}" placeholder="0.00" style="margin-bottom:16px">
    <div style="display:flex;gap:10px">
      <button class="btn-ghost" onclick="closeModal()">CANCEL</button>
      <button class="btn-gold" style="flex:2;padding:10px" onclick="saveExpense(${editIdx!==null?editIdx:'null'})">${e?"SAVE CHANGES":"LOG IT"}</button>
    </div>`);
}
async function saveExpense(editIdx) {
  const date = document.getElementById("e-date").value;
  const desc = document.getElementById("e-desc").value;
  const cat = document.getElementById("e-cat").value;
  const custom = document.getElementById("e-custom").value;
  const amount = parseFloat(document.getElementById("e-amount").value);
  if (!desc||!amount) return;
  const expense = { date, description:desc, category:cat==="Other"&&custom?custom:cat, amount };
  if (editIdx!==null && editIdx!==undefined) {
    state.expenses[editIdx] = expense;
  } else {
    state.expenses.push(expense);
  }
  saveLocal();
  closeModal();
  await syncExpensesToSheet();
  render();
}
function deleteExpense(idx) {
  if (!confirm("Delete this expense?")) return;
  state.expenses.splice(idx,1);
  saveLocal();
  syncExpensesToSheet();
  render();
}

function openCloseWeek() {
  const active = state.codes.filter(c=>c.name&&c.active);
  const collected = active.filter(c=>c.payStatus==="Paid").reduce((s,c)=>s+(parseFloat(c.amountPaid)||0),0);
  const pending = active.filter(c=>c.payStatus==="Pending").length;
  const late = active.filter(c=>c.payStatus==="Late").length;
  showModal(`
    <div class="modal-title">📋 CLOSE WEEK — ${esc(state.weekEnding)} <button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="cw-summary">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <span style="color:#ffffff66;font-size:11px">TOTAL COLLECTED</span>
        <span style="color:#6fcf97;font-weight:700;font-size:18px">$${collected.toFixed(2)}</span>
      </div>
      ${pending>0?`<div style="color:#f2c94c;font-size:11px;margin-bottom:4px">⚠ ${pending} PENDING</div>`:""}
      ${late>0?`<div style="color:#eb5757;font-size:11px">✗ ${late} LATE</div>`:""}
    </div>
    <p style="color:#ffffff66;font-size:11px;line-height:1.7;margin-bottom:16px">Saves this week to Google Sheets and resets payments for next week.</p>
    <div style="display:flex;gap:10px">
      <button class="btn-ghost" onclick="closeModal()">CANCEL</button>
      <button class="btn-gold" style="flex:2;padding:10px;font-size:12px" onclick="confirmCloseWeek()">CONFIRM & CLOSE WEEK</button>
    </div>`);
}
async function confirmCloseWeek() {
  const active = state.codes.filter(c=>c.name&&c.active);
  const payments = active.map(c=>({code:c.code,name:c.name,plan:c.plan,amountDue:amountDue(c),amountPaid:parseFloat(c.amountPaid)||0,payStatus:c.payStatus}));
  state.paymentHistory.push({weekEnding:state.weekEnding,payments,savedAt:new Date().toISOString()});
  state.codes = state.codes.map(c=>({...c,amountPaid:"",payStatus:"Pending"}));
  state.weekEnding = nextSat();
  saveLocal();
  closeModal();
  await syncHistoryToSheet();
  render();
}

function reopenWeek(idx) {
  if (!confirm("Reopen this week? It will be removed from history and restored as the active payment week.")) return;
  const week = state.paymentHistory[idx];
  // Restore payment data onto customer cards
  week.payments.forEach(p => {
    const ci = state.codes.findIndex(c=>c.code===p.code);
    if (ci>=0) {
      state.codes[ci].amountPaid = p.amountPaid||"";
      state.codes[ci].payStatus = p.payStatus||"Pending";
    }
  });
  state.weekEnding = typeof week.weekEnding === 'string' ? week.weekEnding : new Date(week.weekEnding).toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric"});
  state.paymentHistory.splice(idx,1);
  saveLocal();
  syncHistoryToSheet();
  switchTab("payments");
}

function deleteWeek(idx) {
  if (!confirm("Permanently delete this week from history? This cannot be undone.")) return;
  state.paymentHistory.splice(idx,1);
  saveLocal();
  syncHistoryToSheet();
  render();
}

// ─── ACTIONS ────────────────────────────────────────────────────────────────
function toggleExpand(code) { state.expandedCode=state.expandedCode===code?null:code; render(); }
function toggleShowInactive() { state.showInactive=!state.showInactive; render(); }
function setSortMode(mode) { state.sortMode=mode; render(); }
function toggleActive(gi) { state.codes[gi].active=!state.codes[gi].active; saveLocal(); debouncedRosterSync(); render(); }
function toggleClaimed(gi) { state.codes[gi].rewardClaimed=!state.codes[gi].rewardClaimed; saveLocal(); debouncedRosterSync(); render(); }
function updateField(gi,field,value) { state.codes[gi][field]=value; saveLocal(); debouncedRosterSync(); }
function updatePlan(gi,value) {
  state.codes[gi].plan=value;
  if (value==="1x") state.codes[gi].rate=25;
  if (value==="2x") state.codes[gi].rate=20;
  if (value==="custom") { state.codes[gi].paySchedule="per-visit"; state.codes[gi].visitLog=[]; }
  saveLocal(); debouncedRosterSync(); render();
}
function logVisit(gi) {
  showModal(`
    <div class="modal-title">+ LOG VISIT <button class="modal-close" onclick="closeModal()">✕</button></div>
    <label class="lbl">DATE</label><input class="inp" id="v-date" value="${todayStr()}" style="margin-bottom:10px">
    <label class="lbl">AMOUNT ($)</label><input type="number" class="inp" id="v-amount" value="${state.codes[gi].rate}" style="margin-bottom:10px">
    <label class="lbl">METHOD</label>
    <select class="inp" id="v-method" style="margin-bottom:16px">
      ${["Venmo","Cash","Square","Zelle","Check"].map(m=>`<option>${m}</option>`).join("")}
    </select>
    <div style="display:flex;gap:10px">
      <button class="btn-ghost" onclick="closeModal()">CANCEL</button>
      <button class="btn-gold" style="flex:2;padding:10px" onclick="saveVisit(${gi})">CONFIRM VISIT</button>
    </div>`);
}
function saveVisit(gi) {
  const date = document.getElementById("v-date").value;
  const amount = parseFloat(document.getElementById("v-amount").value)||0;
  const method = document.getElementById("v-method").value;
  if (!state.codes[gi].visitLog) state.codes[gi].visitLog=[];
  state.codes[gi].visitLog.push({ date, amount, method });
  // Also log to expenses for full tracking
  state.expenses.push({ date, description:`Visit — ${state.codes[gi].name}`, category:"Income", amount });
  saveLocal(); debouncedRosterSync(); closeModal(); render();
}
function deleteVisit(gi,vi) {
  if (!confirm("Remove this visit?")) return;
  state.codes[gi].visitLog.splice(vi,1);
  saveLocal(); debouncedRosterSync(); render();
}
function cyclePayStatus(gi) { const cur=state.codes[gi].payStatus; state.codes[gi].payStatus=PAY_CYCLE[(PAY_CYCLE.indexOf(cur)+1)%PAY_CYCLE.length]; saveLocal(); debouncedRosterSync(); render(); }
function getSorted() {
  return [...state.codes.filter(c=>c.name)].sort((a,b)=>{
    if (state.sortMode==="route") return (parseInt(a.routeStop)||999)-(parseInt(b.routeStop)||999);
    if (state.sortMode==="day") { const o={Fri:0,Sat:1,Tue:2,Wed:3,Thu:4,"":5}; return (o[a.primaryDay]??5)-(o[b.primaryDay]??5); }
    return a.code.localeCompare(b.code);
  });
}

// ─── RESTORE FROM SHEETS ────────────────────────────────────────────────────
function openRestorePrompt() {
  showModal(`
    <div class="modal-title">⚠ RESTORE FROM SHEETS <button class="modal-close" onclick="closeModal()">✕</button></div>
    <div style="background:#1a1a0a;border:1px solid #C8A84B44;border-radius:8px;padding:14px;margin-bottom:16px">
      <div style="color:#C8A84B;font-weight:700;font-size:12px;margin-bottom:8px">USE THIS ONLY IF:</div>
      <div style="color:#ffffff88;font-size:11px;line-height:1.8">· You got a new phone<br>· Your local app data was lost<br>· You were told to restore</div>
    </div>
    <p style="color:#ffffff66;font-size:11px;line-height:1.7;margin-bottom:16px">This will <span style="color:#eb5757;font-weight:700">overwrite all current app data</span> with what is saved in Google Sheets. Cannot be undone.</p>
    <div style="display:flex;gap:10px">
      <button class="btn-ghost" onclick="closeModal()">CANCEL</button>
      <button style="flex:2;padding:10px;background:#4a1a1a;color:#eb5757;border:1px solid #eb575744;border-radius:6px;cursor:pointer;font-weight:700;font-family:'Courier New',monospace;font-size:12px" onclick="confirmRestore()">YES — RESTORE FROM SHEETS</button>
    </div>`);
}

async function confirmRestore() {
  closeModal();
  setSyncStatus("syncing");
  document.getElementById("content").innerHTML = `<div style="text-align:center;padding:60px;color:#C8A84B;font-size:13px;letter-spacing:.1em">⏳ RESTORING FROM GOOGLE SHEETS...</div>`;
  try {
    const res = await fetch(SCRIPT_URL + "?action=loadAll");
    const data = await res.json();
    if (data.customers && data.customers.length > 0) {
      const fresh = makeCodes();
      data.customers.forEach(c => {
        const idx = fresh.findIndex(f => f.code === c.code);
        if (idx >= 0) fresh[idx] = { ...fresh[idx], ...c, amountPaid:"", payStatus:"Pending" };
      });
      state.codes = fresh;
    }
    if (data.expenses) state.expenses = data.expenses;
    if (data.paymentHistory) {
      const grouped = {};
      data.paymentHistory.forEach(row => {
        const key = String(row.weekEnding);
        if (!grouped[key]) grouped[key] = { weekEnding:key, payments:[] };
        grouped[key].payments.push({ code:row.code, name:row.name, plan:row.plan, amountDue:row.amountDue, amountPaid:row.amountPaid, payStatus:row.payStatus });
      });
      state.paymentHistory = Object.values(grouped);
    }
    saveLocal();
    setSyncStatus("ok");
    setTimeout(()=>setSyncStatus("idle"), 3000);
    render();
    showModal(`
      <div class="modal-title" style="color:#6fcf97">✓ RESTORE COMPLETE <button class="modal-close" onclick="closeModal()">✕</button></div>
      <div style="color:#ffffff88;font-size:12px;line-height:1.8;margin-bottom:16px">Successfully restored from Google Sheets.</div>
      <button class="btn-gold" style="width:100%;padding:10px" onclick="closeModal()">LOOKS GOOD — LET'S GO</button>`);
  } catch(err) {
    setSyncStatus("err");
    showModal(`
      <div class="modal-title" style="color:#eb5757">✕ RESTORE FAILED <button class="modal-close" onclick="closeModal()">✕</button></div>
      <p style="color:#ffffff66;font-size:11px;line-height:1.7;margin-bottom:16px">Could not reach Google Sheets. Check your connection and try again.</p>
      <button class="btn-ghost" style="width:100%;padding:10px" onclick="closeModal()">CLOSE</button>`);
  }
}

// ─── INIT ───────────────────────────────────────────────────────────────────
loadLocal();
if (!state.codes[0].name) {
  state.codes[0] = {...state.codes[0],name:"Mary",address:"1329 Rimrock Rd",phone:"(406) 670-5089",plan:"1x",rate:25,primaryDay:"Fri",active:true};
  state.codes[1] = {...state.codes[1],name:"James Thigpen",address:"2717 Poly Drive",phone:"(509) 859-6629",plan:"1x",rate:25,primaryDay:"Fri",active:true,routeStop:"1",notes:"Front gate on East side. Referred by Mary."};
  saveLocal();
}
render();
</script>
